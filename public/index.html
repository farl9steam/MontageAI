<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard - MontageAI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🌤️ Weather Dashboard</h1>
            <p>Real-time weather information at your fingertips</p>
        </header>

        <main class="main-content">
            <div class="search-section">
                <input 
                    type="text" 
                    id="cityInput" 
                    class="search-input" 
                    placeholder="Search for a city..."
                    aria-label="City search input"
                >
                <button class="search-btn" id="searchBtn">Search</button>
            </div>

            <div id="loading" class="loading" style="display: none;">
                <p>Loading weather data...</p>
            </div>

            <div id="error" class="error" style="display: none;"></div>

            <div id="weatherContainer" class="weather-container">
                <div class="weather-card">
                    <div class="city-name">City Name</div>
                    <div class="temperature">--°C</div>
                    <div class="weather-description">Loading...</div>
                    <div class="weather-details">
                        <div class="detail">
                            <span class="label">Humidity</span>
                            <span class="value">--%</span>
                        </div>
                        <div class="detail">
                            <span class="label">Wind Speed</span>
                            <span class="value">-- m/s</span>
                        </div>
                        <div class="detail">
                            <span class="label">Pressure</span>
                            <span class="value">-- hPa</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2024 MontageAI Weather Dashboard. All rights reserved.</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
